<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SeparateSong</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --card: #13131a; --accent: #00ffaa;
      --accent2: #ff4d6d; --text: #eaeaea; --muted: #555;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Syne', sans-serif; min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 2rem;
    }
    h1 {
      font-size: clamp(2.5rem, 6vw, 4.5rem); font-weight: 800;
      letter-spacing: -2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem; text-align: center;
    }
    .subtitle {
      color: var(--muted); font-family: 'Space Mono', monospace;
      font-size: 0.85rem; margin-bottom: 3rem; text-align: center;
    }
    .card {
      background: var(--card); border: 1px solid #222;
      border-radius: 20px; padding: 2.5rem; width: 100%;
      max-width: 520px; box-shadow: 0 0 60px rgba(0,255,170,0.05);
    }
    .drop-zone {
      border: 2px dashed #333; border-radius: 14px;
      padding: 3rem 2rem; text-align: center; cursor: pointer;
      transition: all 0.3s; position: relative;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent); background: rgba(0,255,170,0.04);
    }
    .drop-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0;
      cursor: pointer; width: 100%; height: 100%;
    }
    .drop-icon { font-size: 3rem; margin-bottom: 1rem; }
    .drop-label { font-size: 1rem; color: var(--muted); }
    .file-name {
      margin-top: 0.75rem; font-family: 'Space Mono', monospace;
      font-size: 0.8rem; color: var(--accent);
    }
    .stems-info {
      display: flex; flex-wrap: wrap; justify-content: center;
      gap: 0.5rem; margin: 2rem 0 1.5rem;
    }
    .stem-tag {
      background: #1a1a24; border: 1px solid #2a2a3a;
      border-radius: 8px; padding: 0.4rem 0.9rem;
      font-size: 0.75rem; font-family: 'Space Mono', monospace; color: var(--muted);
    }
    .btn-group { display: flex; flex-direction: column; gap: 0.75rem; }
    button {
      width: 100%; padding: 1rem;
      background: linear-gradient(135deg, var(--accent), #00ccaa);
      color: #0a0a0f; font-family: 'Syne', sans-serif;
      font-size: 1rem; font-weight: 700; border: none;
      border-radius: 12px; cursor: pointer;
      transition: opacity 0.2s, transform 0.1s; letter-spacing: 0.5px;
    }
    button.btn-instrumental {
      background: linear-gradient(135deg, #ff4d6d, #cc0033);
      color: #fff;
    }
    button:hover { opacity: 0.9; transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .status {
      margin-top: 1.5rem; font-family: 'Space Mono', monospace;
      font-size: 0.82rem; text-align: center; min-height: 1.5rem;
    }
    .status.loading { color: var(--accent); animation: pulse 1.2s infinite; }
    .status.success { color: #00ffaa; }
    .status.error { color: var(--accent2); }
    .progress-bar {
      height: 3px; background: #222; border-radius: 3px;
      margin-top: 1rem; overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      width: 0%; transition: width 0.4s; border-radius: 3px;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  </style>
</head>
<body>
  <h1>SeparateSong</h1>
  <p class="subtitle">// powered by Meta Demucs — unlimited & free</p>
  <div class="card">
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".mp3,.wav,.flac,.ogg,.m4a"/>
      <div class="drop-icon">🎵</div>
      <div class="drop-label">Drop your song here or click to browse</div>
      <div class="file-name" id="fileName"></div>
    </div>
    <div class="stems-info">
      <span class="stem-tag">🥁 Drums</span>
      <span class="stem-tag">🎸 Bass</span>
      <span class="stem-tag">🎤 Vocals</span>
      <span class="stem-tag">🎹 Other</span>
    </div>
    <div class="btn-group">
      <button id="separateBtn" disabled onclick="runAction('/separate', 'stems.zip', 'zip')">
        Separate Stems
      </button>
      <button id="instrumentalBtn" class="btn-instrumental" disabled onclick="runAction('/instrumental', 'instrumental.mp3', 'mp3')">
        🎛️ Extract Instrumental
      </button>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="status" id="status"></div>
  </div>

  <script>
    const fileInput = document.getElementById("fileInput");
    const fileName = document.getElementById("fileName");
    const separateBtn = document.getElementById("separateBtn");
    const instrumentalBtn = document.getElementById("instrumentalBtn");
    const status = document.getElementById("status");
    const progressFill = document.getElementById("progressFill");
    const dropZone = document.getElementById("dropZone");

    fileInput.addEventListener("change", () => {
      if (fileInput.files[0]) {
        fileName.textContent = fileInput.files[0].name;
        separateBtn.disabled = false;
        instrumentalBtn.disabled = false;
        status.textContent = "";
        progressFill.style.width = "0%";
      }
    });

    dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("drag-over"); });
    dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag-over"));
    dropZone.addEventListener("drop", e => {
      e.preventDefault();
      dropZone.classList.remove("drag-over");
      const file = e.dataTransfer.files[0];
      if (file) {
        fileInput.files = e.dataTransfer.files;
        fileName.textContent = file.name;
        separateBtn.disabled = false;
        instrumentalBtn.disabled = false;
      }
    });

    async function runAction(endpoint, downloadName, type) {
      const file = fileInput.files[0];
      if (!file) return;

      separateBtn.disabled = true;
      instrumentalBtn.disabled = true;
      status.className = "status loading";
      status.textContent = "⏳ Processing... this may take 1-3 minutes";
      progressFill.style.width = "30%";

      const formData = new FormData();
      formData.append("file", file);

      try {
        progressFill.style.width = "60%";
        const res = await fetch("http://127.0.0.1:5000" + endpoint, {
          method: "POST",
          body: formData
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || "Server error");
        }

        progressFill.style.width = "100%";
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = downloadName;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        status.className = "status success";
        status.textContent = type === "zip"
          ? "✅ Done! stems.zip downloaded — unzip to get drums, bass, vocals, other"
          : "✅ Done! instrumental.mp3 downloaded — vocals removed";
      } catch (err) {
        status.className = "status error";
        status.textContent = "❌ Error: " + err.message;
        progressFill.style.width = "0%";
      } finally {
        separateBtn.disabled = false;
        instrumentalBtn.disabled = false;
      }
    }
  </script>
</body>
</html>
